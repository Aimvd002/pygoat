name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─── JOB 1: SAST con Bandit ───────────────────────────────────────────────
  bandit_scan:
    name: Run Bandit SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit with SARIF support
        run: pip install bandit[sarif]

      - name: Run Bandit Scan (MEDIUM+ severity & confidence, SARIF output)
        run: |
          bandit -r . \
            --level medium \
            --confidence medium \
            -f sarif \
            -o sast-bandit.sarif \
            --exclude ./.venv,./tests || true

      - name: Upload Bandit SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast-bandit.sarif
          category: bandit

      - name: Upload Bandit SARIF as downloadable artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-bandit-sarif
          path: sast-bandit.sarif

  # ─── JOB 2: SAST con Semgrep  (paralelo a Bandit) ──────────────────────────
  semgrep_scan:
    name: Run Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    container:
      image: returntocorp/semgrep:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep (ERROR + WARNING severity, SARIF output)
        run: |
          semgrep scan \
            --config auto \
            --config p/python \
            --severity=ERROR \
            --severity=WARNING \
            --sarif \
            --output=sast-semgrep.sarif || true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast-semgrep.sarif
          category: semgrep

      - name: Upload Semgrep SARIF as downloadable artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep-sarif
          path: sast-semgrep.sarif

  # ─── JOB 3: Build Docker + Docker Scout (espera a los SAST) ───────────────
  docker_build_and_scout:
    name: Build Docker Image & Scout Analysis
    runs-on: ubuntu-latest
    needs: [ bandit_scan, semgrep_scan ]
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Docker Scout CVE Analysis
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          only-severities: critical,high
          exit-code: false
          dockerhub-user: ${{ secrets.DOCKER_USER }}
          dockerhub-password: ${{ secrets.DOCKER_PASSWORD }}
