name: ci
 
on:
  push:
    branches: [ "master", "main" ]
 
jobs:
  bandit_scan:
    name: Run Bandit SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Bandit con soporte SARIF
        run: pip install bandit[sarif]
      - name: Ejecutar Bandit Scan
        run: bandit -r . -f sarif -o sast-bandit.sarif -ll -ii || true
      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast-bandit.sarif
          category: bandit
      - name: Subir artefacto SARIF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-bandit-sarif
          path: sast-bandit.sarif
 
  semgrep_scan:
    name: Run Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Ejecutar Semgrep Scan
        run: >
          semgrep scan --config auto --config p/python
          --severity=ERROR --severity=WARNING
          --sarif --output=sast-semgrep.sarif || true
      - name: Subir SARIF a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sast-semgrep.sarif
          category: semgrep
      - name: Subir artefacto SARIF
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-semgrep-sarif
          path: sast-semgrep.sarif
 
  docker_build_and_scan:
    name: Build y análisis de imagen Docker
    runs-on: ubuntu-latest
    needs: [bandit_scan, semgrep_scan]
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Autenticación en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Construir y publicar imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USER }}/pygoat:${{ github.sha }}
      - name: Análisis con Docker Scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ secrets.DOCKER_USER }}/pygoat:${{ github.sha }}
          only-severities: critical,high
          exit-code: false
          dockerhub-user: ${{ secrets.DOCKER_USER }}
          dockerhub-password: ${{ secrets.DOCKER_PASSWORD }}

